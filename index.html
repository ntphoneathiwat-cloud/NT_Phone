<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NT PHONE | เข้าสู่ระบบ</title>
    
    <style>@import url('https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;500;600;700&display=swap');</style>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        :root {
            /* โทนสี 2 โหมด: ล็อกอิน (ฟ้าคราม) / สมัคร (ชมพูพีช) */
            --theme-login: linear-gradient(135deg, #1E3A8A 0%, #3B82F6 100%);
            --theme-register: linear-gradient(135deg, #BE123C 0%, #F43F5E 100%);
            --theme-current: var(--theme-login);
            
            --sys-black: #0F172A;
            --sys-dark: #334155;
            --sys-gray: #94A3B8;
            --sys-light: #F8FAFC;
            --white: #FFFFFF;
            --border: #E2E8F0;
            --success: #10B981;
            --warning: #F59E0B;
            --error: #EF4444;
        }

        body.register-mode { --theme-current: var(--theme-register); }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Anuphan', sans-serif; }

        body {
            background-color: var(--sys-light); min-height: 100vh;
            display: flex; align-items: center; justify-content: center; padding: 20px;
            background-image: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.8) 0%, transparent 80%);
            transition: background 0.5s ease;
        }

        /* ================= Layout ================= */
        .container {
            display: flex; width: 100%; max-width: 1050px; min-height: 600px;
            background: var(--white); border-radius: 30px;
            box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.1);
            overflow: hidden; position: relative;
        }

        .brand-section {
            flex: 1; background: linear-gradient(135deg, #F8FAFC 0%, #F1F5F9 100%);
            display: flex; align-items: center; justify-content: center; padding: 40px; position: relative;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 50px 40px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.9);
            text-align: center; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
        }

        .glass-panel h1 { 
            font-size: 3.5rem; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 10px;
            background: var(--theme-current); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 15px; letter-spacing: -1px; transition: 0.5s;
        }
        .glass-panel h1 i { color: var(--accent); -webkit-text-fill-color: initial; }
        .glass-panel p { color: var(--sys-gray); font-size: 1.15rem; line-height: 1.6; }

        /* ================= Form Section ================= */
        .form-section {
            flex: 1; padding: 50px 60px; display: flex; align-items: center; justify-content: center;
            overflow-y: auto; max-height: 90vh; position: relative;
        }
        .form-section::-webkit-scrollbar { width: 6px; }
        .form-section::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }

        .form-card { width: 100%; max-width: 400px; display: none; animation: fadeIn 0.4s ease forwards; }
        .form-card.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .form-card h2 { font-size: 2.2rem; color: var(--sys-black); margin-bottom: 5px; font-weight: 700; }
        .subtitle { color: var(--sys-gray); margin-bottom: 30px; font-size: 1rem; }

        /* Inputs */
        .input-row { display: flex; gap: 15px; }
        .input-group { margin-bottom: 20px; width: 100%; position: relative; }
        .input-group label { display: block; font-size: 0.9rem; font-weight: 600; margin-bottom: 8px; color: var(--sys-dark); }
        .input-wrapper { position: relative; }
        
        .input-wrapper input, .input-wrapper select {
            width: 100%; padding: 16px 18px; border: 2px solid transparent; border-radius: 16px;
            font-size: 1.05rem; background: var(--sys-light); color: var(--sys-black); transition: 0.3s; outline: none; -webkit-appearance: none;
        }
        .input-wrapper input:focus, .input-wrapper select:focus { background: var(--white); border-color: #94A3B8; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }

        /* Micro Interactions */
        .char-counter { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); font-size: 0.85rem; color: var(--sys-gray); font-weight: 600; }
        .char-counter.complete { color: var(--success); }
        .strength-meter { display: flex; gap: 5px; margin-top: 10px; height: 4px; }
        .strength-bar { flex: 1; background: var(--border); border-radius: 4px; transition: 0.4s ease; }
        .strength-text { font-size: 0.8rem; margin-top: 6px; color: var(--sys-gray); text-align: right; }
        .match-msg { font-size: 0.85rem; margin-top: 8px; font-weight: 600; opacity: 0; transition: 0.3s; display: flex; align-items: center; gap: 4px; }
        .match-msg.show { opacity: 1; } .match-msg.error { color: var(--error); } .match-msg.success { color: var(--success); }

        /* Buttons */
        .btn-primary {
            width: 100%; padding: 18px; background: var(--theme-current); color: var(--white);
            border: none; border-radius: 16px; font-size: 1.15rem; font-weight: 600;
            cursor: pointer; transition: 0.3s; margin-top: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.15); display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0,0,0,0.2); }
        .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
        
        .spinner { width: 22px; height: 22px; border: 3px solid rgba(255,255,255,0.3); border-top: 3px solid white; border-radius: 50%; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .switch-text { text-align: center; margin-top: 30px; color: var(--sys-gray); font-size: 1rem; }
        .switch-text span { color: var(--sys-black); font-weight: 700; cursor: pointer; transition: 0.3s; padding: 5px 10px; border-radius: 8px; }
        .switch-text span:hover { background: var(--border); }

        /* ================= Custom Modals ================= */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 9999; opacity: 0; visibility: hidden; transition: 0.3s; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        
        .modal-box { background: var(--white); width: 90%; max-width: 380px; border-radius: 24px; padding: 35px 25px; text-align: center; transform: scale(0.9) translateY(20px); transition: 0.4s; box-shadow: 0 30px 60px rgba(0,0,0,0.15); }
        .modal-overlay.active .modal-box { transform: scale(1) translateY(0); }
        
        .modal-icon { width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 35px; color: white; }
        .modal-icon.success { background: var(--success); box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3); }
        .modal-icon.error { background: var(--error); box-shadow: 0 10px 20px rgba(239, 68, 68, 0.3); }
        
        .modal-title { font-size: 1.4rem; color: var(--sys-black); margin-bottom: 10px; font-weight: 700; }
        .modal-message { font-size: 1.05rem; color: var(--sys-gray); margin-bottom: 25px; line-height: 1.6; white-space: pre-line; }
        .btn-modal { width: 100%; padding: 16px; background: var(--sys-black); border: none; border-radius: 14px; font-size: 1.1rem; font-weight: 600; color: white; cursor: pointer; transition: 0.2s; }
        .btn-modal:hover { background: var(--sys-dark); }

        /* Responsive */
        @media (max-width: 800px) {
            body { padding: 0; align-items: flex-start; }
            .container { flex-direction: column; height: auto; min-height: 100vh; border-radius: 0; }
            .brand-section { flex: none; padding: 40px 20px 30px; }
            .glass-panel { padding: 0; border: none; background: transparent; backdrop-filter: none; box-shadow: none;}
            .glass-panel h1 { font-size: 2.8rem; }
            .form-section { flex: 1; padding: 20px 20px 50px; align-items: flex-start; max-height: none; overflow: visible;}
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="brand-section">
            <div class="glass-panel">
                <h1><i class="ph-fill ph-device-mobile-camera"></i> NT PHONE</h1>
                <p>สมาร์ทโฟนระดับพรีเมียม<br>ผ่อนง่าย อนุมัติไว ได้เครื่องชัวร์</p>
            </div>
        </div>

        <div class="form-section">
            
            <div id="login-form" class="form-card active">
                <h2>เข้าสู่ระบบ</h2>
                <p class="subtitle">ระบุข้อมูลเข้าใช้งานเพื่อไปที่หน้าแดชบอร์ด</p>
                
                <div class="input-group">
                    <label>เบอร์โทรศัพท์ หรือ รหัสพนักงาน</label>
                    <div class="input-wrapper">
                        <input type="text" id="login-id" placeholder="08XXXXXXXX">
                    </div>
                </div>
                
                <div class="input-group">
                    <label>รหัสผ่าน</label>
                    <div class="input-wrapper"><input type="password" id="login-password" placeholder="••••••••"></div>
                </div>

                <button class="btn-primary" id="btn-login">
                    <span class="spinner" id="login-spinner"></span>
                    <span id="login-btn-text">เข้าสู่ระบบ</span>
                </button>
                <p class="switch-text">ยังไม่มีบัญชีใช่ไหม? <span onclick="switchMode('register')">สร้างบัญชีใหม่</span></p>
            </div>

            <div id="register-form" class="form-card">
                <h2>สร้างบัญชีใหม่</h2>
                <p class="subtitle">กรอกข้อมูลเพื่อรับรหัสประจำตัวลูกค้า</p>
                
                <div class="input-row">
                    <div class="input-group" style="flex: 0.7;">
                        <label>คำนำหน้า</label>
                        <div class="input-wrapper">
                            <select id="reg-prefix">
                                <option value="นาย">นาย</option>
                                <option value="นาง">นาง</option>
                                <option value="นางสาว">นางสาว</option>
                            </select>
                        </div>
                    </div>
                    <div class="input-group" style="flex: 1.3;">
                        <label>ชื่อจริง</label>
                        <div class="input-wrapper"><input type="text" id="reg-firstname" placeholder="ชื่อจริง"></div>
                    </div>
                </div>

                <div class="input-group">
                    <label>นามสกุล</label>
                    <div class="input-wrapper"><input type="text" id="reg-lastname" placeholder="นามสกุล"></div>
                </div>

                <div class="input-group">
                    <label>เบอร์โทรศัพท์ (ใช้เข้าสู่ระบบ)</label>
                    <div class="input-wrapper">
                        <input type="tel" id="reg-phone" placeholder="08XXXXXXXX" maxlength="10" inputmode="numeric" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                        <span class="char-counter" id="phone-counter">0/10</span>
                    </div>
                </div>
                
                <div class="input-group">
                    <label>ตั้งรหัสผ่าน</label>
                    <div class="input-wrapper"><input type="password" id="reg-password" placeholder="ตั้งรหัสผ่านของคุณ"></div>
                    <div class="strength-meter"><div class="strength-bar" id="str-1"></div><div class="strength-bar" id="str-2"></div><div class="strength-bar" id="str-3"></div></div>
                    <div class="strength-text" id="str-text">รหัสผ่านคาดเดาง่าย</div>
                </div>

                <div class="input-group">
                    <label>ยืนยันรหัสผ่าน</label>
                    <div class="input-wrapper"><input type="password" id="reg-confirm-password" placeholder="พิมพ์รหัสผ่านอีกครั้ง"></div>
                    <div class="match-msg" id="match-msg"></div>
                </div>

                <button class="btn-primary" id="btn-register">
                    <span class="spinner" id="reg-spinner"></span>
                    <span id="reg-btn-text">ยืนยันการสมัคร</span>
                </button>
                <p class="switch-text">มีบัญชีอยู่แล้ว? <span onclick="switchMode('login')">กลับไปเข้าสู่ระบบ</span></p>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="custom-modal">
        <div class="modal-box">
            <div class="modal-icon" id="modal-icon"><i class="ph-bold ph-check"></i></div>
            <h3 class="modal-title" id="modal-title">สำเร็จ</h3>
            <p class="modal-message" id="modal-message">ข้อความ</p>
            <button class="btn-modal" id="modal-btn" onclick="closeModal()">ตกลง</button>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const supabaseUrl = 'https://xjjcnlzynzsvopmcooky.supabase.co'
        const supabaseKey = 'sb_publishable_w7A_BOSi0r1r4t93exl1gg_j1jPRU_E'
        const supabase = createClient(supabaseUrl, supabaseKey)

        // ================= ควบคุม UI =================
        window.switchMode = (mode) => {
            document.getElementById('login-form').classList.remove('active');
            document.getElementById('register-form').classList.remove('active');
            document.body.classList.remove('register-mode');

            if (mode === 'register') {
                document.getElementById('register-form').classList.add('active');
                document.body.classList.add('register-mode');
                document.querySelector('.form-section').scrollTop = 0;
            } else { 
                document.getElementById('login-form').classList.add('active');
            }
        };

        window.showModal = (type, title, message, onConfirm = null) => {
            const modal = document.getElementById('custom-modal');
            const icon = document.getElementById('modal-icon');
            const btn = document.getElementById('modal-btn');
            
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-message').innerText = message;

            if(type === 'success') { 
                icon.className = 'modal-icon success'; icon.innerHTML = '<i class="ph-bold ph-check"></i>'; 
            } else { 
                icon.className = 'modal-icon error'; icon.innerHTML = '<i class="ph-bold ph-x"></i>'; 
            }
            
            btn.onclick = () => {
                closeModal();
                if(onConfirm) onConfirm();
            };
            modal.classList.add('active');
        };

        window.closeModal = () => document.getElementById('custom-modal').classList.remove('active');

        function setLoading(btnId, spinnerId, textId, text, isLoading) {
            const btn = document.getElementById(btnId), spinner = document.getElementById(spinnerId), txt = document.getElementById(textId);
            if(isLoading) { btn.disabled = true; spinner.style.display = 'block'; txt.innerText = 'กำลังตรวจสอบ...'; } 
            else { btn.disabled = false; spinner.style.display = 'none'; txt.innerText = text; }
        }

        // ================= เข้าสู่ระบบ (Ninja Mode) =================
        document.getElementById('btn-login').addEventListener('click', async () => {
            const loginId = document.getElementById('login-id').value.trim();
            const password = document.getElementById('login-password').value;

            if(!loginId || !password) return showModal('error', 'ข้อมูลไม่ครบ', 'กรุณาระบุข้อมูลเข้าสู่ระบบให้ครบถ้วน');

            setLoading('btn-login', 'login-spinner', 'login-btn-text', 'เข้าสู่ระบบ', true);

            // 1. ตรวจสอบพนักงาน (Employees)
            const { data: staffData } = await supabase.from('employees').select('*').eq('username', loginId).eq('password', password);

            if (staffData && staffData.length > 0) {
                const emp = staffData[0];
                setLoading('btn-login', 'login-spinner', 'login-btn-text', 'เข้าสู่ระบบ', false);
                
                localStorage.setItem('emp_id', emp.emp_id); 
                localStorage.setItem('emp_name', emp.name); 
                localStorage.setItem('emp_role', emp.role);

                // กำหนดชื่อตำแหน่งที่จะโชว์ในป๊อปอัพ
                let roleName = 'พนักงานขาย (POS)';
                if (emp.role === 'ceo') roleName = 'ประธานบริษัท (CEO)';
                else if (emp.role === 'admin') roleName = 'ผู้จัดการสาขา (Admin)';
                
                return showModal('success', 'ยืนยันตัวตนสำเร็จ', `ยินดีต้อนรับคุณ ${emp.name}\n${roleName}`, () => {
                    // แยกว่าใครต้องไปหน้าไหน!
                    if (emp.role === 'ceo') {
                        window.location.href = "ceo_dashboard.html";    // CEO ไปหน้าควบคุมสูงสุด
                    } else if (emp.role === 'admin') {
                        window.location.href = "admin.html";  // ผจก. ไปหน้าหลังบ้านสาขา
                    } else {
                        window.location.href = "pos.html";    // พนักงานขาย ไปหน้าเครื่องคิดเงิน
                    }
                });
            }

            // 2. ตรวจสอบลูกค้า (Customers)
            const { data: custData, error: custError } = await supabase.from('customers').select('*').eq('phone', loginId).eq('password', password);
            setLoading('btn-login', 'login-spinner', 'login-btn-text', 'เข้าสู่ระบบ', false);

            if (custError) return showModal('error', 'ระบบขัดข้อง', 'ไม่สามารถเชื่อมต่อฐานข้อมูลได้');

            if (custData && custData.length > 0) {
                const user = custData[0];
                localStorage.setItem('customer_id', user.customer_id); 
                localStorage.setItem('customer_name', user.first_name);
                
                return showModal('success', 'เข้าสู่ระบบสำเร็จ', `ยินดีต้อนรับคุณ ${user.first_name}`, () => {
                    window.location.href = "dashboard.html"; // พาไปหน้าแดชบอร์ดลูกค้า
                });
            }

            // 3. ไม่พบข้อมูล
            showModal('error', 'เข้าสู่ระบบไม่สำเร็จ', 'เบอร์โทรศัพท์ หรือ รหัสผ่านไม่ถูกต้อง');
        });

        // ================= ลูกค้าสมัครสมาชิก =================
        const regPhone = document.getElementById('reg-phone'), phoneCounter = document.getElementById('phone-counter');
        regPhone.addEventListener('input', () => { const len = regPhone.value.length; phoneCounter.innerText = `${len}/10`; if(len===10) phoneCounter.classList.add('complete'); else phoneCounter.classList.remove('complete'); });

        const regPassword = document.getElementById('reg-password'), str1 = document.getElementById('str-1'), str2 = document.getElementById('str-2'), str3 = document.getElementById('str-3'), strText = document.getElementById('str-text');
        regPassword.addEventListener('input', () => {
            const val = regPassword.value; let strength = 0;
            if(val.length >= 6) strength++; if(val.match(/[0-9]/) && val.match(/[a-zA-Z]/)) strength++; if(val.length >= 8 && val.match(/[^a-zA-Z0-9]/)) strength++;
            str1.style.background = '#E2E8F0'; str2.style.background = '#E2E8F0'; str3.style.background = '#E2E8F0';
            if(val.length === 0) { strText.innerText = "รหัสผ่านคาดเดาง่าย"; strText.style.color = "var(--sys-gray)"; } 
            else if(strength <= 1) { str1.style.background = "var(--error)"; strText.innerText = "ความปลอดภัย: ต่ำ"; strText.style.color = "var(--error)"; } 
            else if(strength === 2) { str1.style.background = "var(--warning)"; str2.style.background = "var(--warning)"; strText.innerText = "ความปลอดภัย: ปานกลาง"; strText.style.color = "var(--warning)"; } 
            else { str1.style.background = "var(--success)"; str2.style.background = "var(--success)"; str3.style.background = "var(--success)"; strText.innerText = "ความปลอดภัย: สูงมาก"; strText.style.color = "var(--success)"; }
            checkPasswordMatch();
        });

        const regConfirm = document.getElementById('reg-confirm-password'), matchMsg = document.getElementById('match-msg');
        function checkPasswordMatch() {
            if(regConfirm.value.length === 0) { matchMsg.className = 'match-msg'; return; }
            if(regPassword.value === regConfirm.value) { matchMsg.className = 'match-msg show success'; matchMsg.innerHTML = '<i class="ph-bold ph-check"></i> รหัสผ่านตรงกัน'; } 
            else { matchMsg.className = 'match-msg show error'; matchMsg.innerHTML = '<i class="ph-bold ph-x"></i> รหัสผ่านไม่ตรงกัน'; }
        }
        regConfirm.addEventListener('input', checkPasswordMatch);

        document.getElementById('btn-register').addEventListener('click', async () => {
            const prefix = document.getElementById('reg-prefix').value;
            const firstName = document.getElementById('reg-firstname').value.trim();
            const lastName = document.getElementById('reg-lastname').value.trim();
            const phone = document.getElementById('reg-phone').value;
            const password = document.getElementById('reg-password').value;
            const confirmPassword = document.getElementById('reg-confirm-password').value;

            if(!firstName || !lastName || phone.length !== 10 || password.length < 6 || password !== confirmPassword) {
                return showModal('error', 'ข้อมูลไม่ถูกต้อง', 'กรุณากรอกข้อมูลให้ครบถ้วนและถูกต้อง (รหัสผ่าน 6 ตัวอักษรขึ้นไป)');
            }

            setLoading('btn-register', 'reg-spinner', 'reg-btn-text', 'ยืนยันการสมัคร', true);
            
            // เช็คเบอร์ซ้ำ
            const { data: checkPhone } = await supabase.from('customers').select('phone').eq('phone', phone);
            if (checkPhone && checkPhone.length > 0) { 
                setLoading('btn-register', 'reg-spinner', 'reg-btn-text', 'ยืนยันการสมัคร', false); 
                return showModal('error', 'ลงทะเบียนซ้ำ', 'เบอร์โทรศัพท์นี้มีในระบบแล้ว กรุณาเข้าสู่ระบบ'); 
            }

            // รันเลขลูกค้า (ดึงเลขล่าสุดมาบวก 1)
            const { data: lastCust } = await supabase.from('customers').select('customer_id').order('created_at', { ascending: false }).limit(1);
            let newCustomerId = 'NT100001';
            if (lastCust && lastCust.length > 0 && lastCust[0].customer_id) {
                const numPart = parseInt(lastCust[0].customer_id.replace('NT', ''));
                if (!isNaN(numPart)) newCustomerId = 'NT' + (numPart + 1);
            }

            const { error: insertError } = await supabase.from('customers').insert([{ 
                customer_id: newCustomerId, phone: phone, password: password, prefix: prefix, first_name: firstName, last_name: lastName, role: 'buyer' 
            }]);
            
            setLoading('btn-register', 'reg-spinner', 'reg-btn-text', 'ยืนยันการสมัคร', false);

            if (insertError) { 
                showModal('error', 'เกิดข้อผิดพลาด', 'ไม่สามารถบันทึกข้อมูลได้ กรุณาลองใหม่อีกครั้ง'); 
            } else {
                // เซ็ตค่าล็อคอินแล้วพาเข้า Dashboard เลย
                localStorage.setItem('customer_id', newCustomerId); 
                localStorage.setItem('customer_name', firstName);
                
                showModal('success', 'สร้างบัญชีสำเร็จ!', `รหัสประจำตัวลูกค้าของคุณคือ\n[ ${newCustomerId} ]\n\nระบบจะพาท่านเข้าสู่หน้าแดชบอร์ด`, () => { 
                    window.location.href = "dashboard.html"; 
                });
            }
        });
    </script>
</body>
</html>
