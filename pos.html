<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NT PHONE | Smart POS</title>
    
    <style>@import url('https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;500;600;700&display=swap');</style>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        /* ================= Premium POS Variables ================= */
        :root {
            --bg-body: #F5F5F7; --bg-surface: #FFFFFF; --bg-cart: #FAFAFC;
            --text-main: #1D1D1F; --text-muted: #86868B; --border-color: #E5E5EA;
            --accent-blue: #0071E3; --accent-light: #E8F2FC;
            --danger: #FF3B30; --success: #34C759; --warning: #F59E0B;
            --shadow-sm: 0 2px 10px rgba(0, 0, 0, 0.03);
            --shadow-md: 0 10px 30px rgba(0, 0, 0, 0.08);
            --radius-md: 12px; --radius-lg: 20px;
        }

        [data-theme="dark"] {
            --bg-body: #000000; --bg-surface: #1C1C1E; --bg-cart: #151515;
            --text-main: #F5F5F7; --text-muted: #A1A1A6; --border-color: #38383A;
            --accent-blue: #2997FF; --accent-light: rgba(41, 151, 255, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Anuphan', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-body); color: var(--text-main); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* ================= Header ================= */
        .pos-header {
            background: var(--bg-surface); height: 70px; display: flex; justify-content: space-between; align-items: center;
            padding: 0 25px; border-bottom: 1px solid var(--border-color); z-index: 100; flex-shrink: 0;
        }
        .logo { font-size: 1.3rem; font-weight: 700; display: flex; align-items: center; gap: 10px; color: var(--text-main); text-decoration: none; }
        .logo i { color: var(--accent-blue); font-size: 1.6rem; }
        
        .header-tools { display: flex; align-items: center; gap: 15px; }
        .search-bar { position: relative; width: 350px; }
        .search-bar i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 1.2rem; }
        .search-bar input { width: 100%; padding: 10px 15px 10px 45px; border-radius: 20px; border: 1px solid var(--border-color); background: var(--bg-body); outline: none; transition: 0.2s; font-size: 0.95rem; }
        .search-bar input:focus { border-color: var(--accent-blue); box-shadow: 0 0 0 3px var(--accent-light); background: var(--bg-surface); }
        
        .btn-icon { width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border-color); background: transparent; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 1.2rem; color: var(--text-main); transition: 0.2s; }
        .btn-icon:hover { background: var(--bg-body); color: var(--accent-blue); border-color: var(--accent-blue); }

        /* ================= Main Layout (Split View) ================= */
        .pos-layout { display: flex; flex: 1; overflow: hidden; }

        /* --- Left: Product Catalog --- */
        .catalog-section { flex: 7; display: flex; flex-direction: column; overflow: hidden; background: var(--bg-body); padding: 20px; }
        
        .brand-filter { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; margin-bottom: 10px; -ms-overflow-style: none; scrollbar-width: none; flex-shrink: 0; }
        .brand-filter::-webkit-scrollbar { display: none; }
        .filter-chip { padding: 8px 20px; border-radius: 20px; background: var(--bg-surface); border: 1px solid var(--border-color); font-weight: 600; font-size: 0.9rem; cursor: pointer; white-space: nowrap; transition: 0.2s; }
        .filter-chip.active { background: var(--text-main); color: var(--bg-surface); border-color: var(--text-main); }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; overflow-y: auto; padding-bottom: 20px; align-content: start; }
        .product-card { background: var(--bg-surface); border-radius: var(--radius-lg); padding: 15px; border: 1px solid var(--border-color); cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; gap: 10px; box-shadow: var(--shadow-sm); }
        .product-card:hover { border-color: var(--accent-blue); transform: translateY(-3px); box-shadow: var(--shadow-md); }
        .product-card.disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }
        
        .p-img-box { width: 100%; height: 120px; background: var(--bg-body); border-radius: var(--radius-md); display: flex; justify-content: center; align-items: center; overflow: hidden; padding: 5px; position: relative; }
        .p-img-box img { width: 100%; height: 100%; object-fit: contain; }
        .p-stock-badge { position: absolute; top: 8px; right: 8px; background: var(--success); color: white; font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: 10px; }
        .p-stock-badge.empty { background: var(--danger); }
        
        .p-info { flex: 1; display: flex; flex-direction: column; }
        .p-brand { font-size: 0.75rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase; }
        .p-name { font-size: 0.95rem; font-weight: 700; line-height: 1.3; margin-bottom: 5px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .p-variant { font-size: 0.8rem; color: var(--text-muted); display: flex; align-items: center; gap: 5px; margin-bottom: 8px; }
        .color-dot { width: 10px; height: 10px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.1); }
        .p-price { font-size: 1.1rem; font-weight: 700; color: var(--accent-blue); margin-top: auto; }

        /* --- Right: Cart / Bill Section --- */
        .cart-section { flex: 3; min-width: 350px; background: var(--bg-cart); border-left: 1px solid var(--border-color); display: flex; flex-direction: column; z-index: 10; box-shadow: -5px 0 20px rgba(0,0,0,0.02); }
        
        .cart-header { padding: 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .cart-title { font-size: 1.2rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .btn-clear { background: rgba(255, 59, 48, 0.1); color: var(--danger); border: none; padding: 6px 12px; border-radius: 10px; font-weight: 600; font-size: 0.8rem; cursor: pointer; transition: 0.2s; }
        .btn-clear:hover { background: var(--danger); color: white; }

        .cart-items { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .cart-empty { text-align: center; color: var(--text-muted); padding: 40px 20px; font-weight: 500; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .cart-empty i { font-size: 3rem; color: var(--border-color); }
        
        .cart-item { background: var(--bg-surface); padding: 12px; border-radius: var(--radius-md); border: 1px solid var(--border-color); display: flex; align-items: center; gap: 12px; }
        .ci-img { width: 50px; height: 50px; border-radius: 8px; object-fit: contain; background: var(--bg-body); border: 1px solid var(--border-color); padding: 2px; }
        .ci-details { flex: 1; }
        .ci-name { font-size: 0.9rem; font-weight: 700; line-height: 1.2; margin-bottom: 2px; }
        .ci-var { font-size: 0.75rem; color: var(--text-muted); }
        .ci-price { font-size: 0.95rem; font-weight: 700; color: var(--accent-blue); }
        
        .ci-qty-ctrl { display: flex; align-items: center; background: var(--bg-body); border-radius: 8px; border: 1px solid var(--border-color); overflow: hidden; }
        .qty-btn { width: 28px; height: 28px; background: transparent; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-main); font-weight: 700; }
        .qty-btn:hover { background: var(--border-color); }
        .qty-val { width: 30px; text-align: center; font-size: 0.9rem; font-weight: 700; border: none; border-left: 1px solid var(--border-color); border-right: 1px solid var(--border-color); background: transparent; }

        /* --- Checkout Bottom Area --- */
        .cart-footer { padding: 20px; background: var(--bg-surface); border-top: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 15px; }
        
        .payment-toggle { display: flex; background: var(--bg-body); padding: 4px; border-radius: 12px; border: 1px solid var(--border-color); }
        .pt-btn { flex: 1; text-align: center; padding: 10px; font-size: 0.95rem; font-weight: 600; cursor: pointer; border-radius: 10px; transition: 0.2s; color: var(--text-muted); border: none; background: transparent; }
        .pt-btn.active { background: var(--bg-surface); color: var(--text-main); box-shadow: var(--shadow-sm); }

        .summary-row { display: flex; justify-content: space-between; font-size: 1rem; color: var(--text-muted); margin-bottom: 5px; }
        .summary-row.total { font-size: 1.5rem; font-weight: 700; color: var(--text-main); margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border-color); }
        .total-val { color: var(--accent-blue); }

        .btn-checkout { width: 100%; background: var(--text-main); color: var(--bg-surface); padding: 18px; border-radius: 16px; font-size: 1.1rem; font-weight: 700; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .btn-checkout:hover { transform: translateY(-2px); opacity: 0.9; }
        .btn-checkout:disabled { background: var(--border-color); color: var(--text-muted); cursor: not-allowed; box-shadow: none; transform: none; }

        /* ================= Modals (Checkout & Payment) ================= */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 9999; opacity: 0; visibility: hidden; transition: 0.3s ease; padding: 20px; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-card { background: var(--bg-surface); width: 100%; max-width: 450px; border-radius: var(--radius-lg); padding: 35px 30px; box-shadow: var(--shadow-md); transform: scale(0.95); transition: 0.3s; position: relative; }
        .modal-overlay.active .modal-card { transform: scale(1); }
        
        .modal-close { position: absolute; top: 20px; right: 20px; background: var(--bg-body); border: none; width: 36px; height: 36px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; color: var(--text-muted); display: flex; align-items: center; justify-content: center; }
        .modal-close:hover { background: var(--border-color); color: var(--text-main); }

        .modal-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        
        .form-group { margin-bottom: 15px; }
        .form-label { display: block; font-size: 0.95rem; font-weight: 600; margin-bottom: 8px; color: var(--text-main); }
        .form-input { width: 100%; padding: 16px; border-radius: 12px; border: 1px solid var(--border-color); background: var(--bg-body); color: var(--text-main); font-size: 1.2rem; font-weight: 700; outline: none; transition: 0.2s; }
        .form-input:focus { border-color: var(--accent-blue); box-shadow: 0 0 0 3px var(--accent-light); background: var(--bg-surface); }
        
        .change-display { text-align: center; padding: 20px; background: var(--bg-body); border-radius: 16px; margin: 20px 0; border: 1px dashed var(--border-color); }
        .change-label { font-size: 1rem; color: var(--text-muted); font-weight: 600; margin-bottom: 5px; }
        .change-val { font-size: 2.5rem; font-weight: 700; color: var(--success); }

        .btn-print-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn-print { flex: 1; padding: 14px; border-radius: 12px; font-weight: 700; border: 1px solid var(--accent-blue); background: var(--bg-surface); color: var(--accent-blue); cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-print:hover { background: var(--accent-blue); color: white; }

        /* ================= THERMAL PRINTER ENGINE (THE MAGIC) ================= */
        #print-area { display: none; }
        
        @media print {
            body > * { display: none !important; }
            #print-area { display: block !important; position: absolute; left: 0; top: 0; width: 100%; margin: 0; padding: 0; background: white; color: black; }
            
            .receipt-base { font-family: 'Anuphan', sans-serif, monospace; color: black; background: white; margin: 0; padding: 10px 0; }
            .receipt-header { text-align: center; margin-bottom: 10px; }
            .receipt-header h2 { margin: 0 0 5px 0; font-size: 1.2em; font-weight: bold; }
            .receipt-header p { margin: 2px 0; font-size: 0.85em; }
            .receipt-divider { border-bottom: 1px dashed black; margin: 8px 0; }
            .receipt-table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
            .receipt-table th { border-bottom: 1px solid black; padding-bottom: 4px; text-align: left; }
            .receipt-table td { padding: 4px 0; vertical-align: top; }
            .receipt-table .r-price { text-align: right; }
            .receipt-summary { width: 100%; font-size: 0.9em; margin-top: 5px; }
            .receipt-summary td { padding: 3px 0; }
            .receipt-total { font-weight: bold; font-size: 1.1em; }
            .receipt-footer { text-align: center; margin-top: 15px; font-size: 0.8em; }
            
            /* Profile for 58mm Printer (Width approx 48mm printable) */
            .receipt-58 { width: 58mm; max-width: 58mm; overflow: hidden; }
            .receipt-58 .receipt-header h2 { font-size: 1.1em; }
            .receipt-58 .receipt-table { font-size: 0.75em; }
            
            /* Profile for 80mm Printer (Width approx 72mm printable) */
            .receipt-80 { width: 80mm; max-width: 80mm; overflow: hidden; }
        }

        /* Responsive Mobile */
        @media (max-width: 900px) {
            .pos-layout { flex-direction: column; }
            .catalog-section { flex: 1; padding: 15px; }
            .cart-section { flex: none; height: 350px; border-left: none; border-top: 1px solid var(--border-color); }
            .search-bar { width: 200px; }
        }
    </style>
</head>
<body>

    <header class="pos-header">
        <a href="ceo_dashboard.html" class="logo"><i class="ph-fill ph-device-mobile-camera"></i> NT PHONE POS</a>
        <div class="header-tools">
            <div class="search-bar">
                <i class="ph-bold ph-barcode"></i>
                <input type="text" id="pos-search" placeholder="สแกนบาร์โค้ด หรือ พิมพ์ชื่อรุ่น..." autocomplete="off">
            </div>
            <button class="btn-icon" onclick="toggleTheme()"><i class="ph-bold ph-moon" id="theme-icon"></i></button>
            <div style="font-size:0.9rem; font-weight:600; color:var(--text-muted); border-left:1px solid var(--border-color); padding-left:15px; margin-left:5px;">
                แคชเชียร์: <span id="cashier-name" style="color:var(--text-main);">Admin</span>
            </div>
        </div>
    </header>

    <div class="pos-layout">
        
        <div class="catalog-section">
            <div class="brand-filter" id="brand-filter-container">
                <button class="filter-chip active" onclick="filterBrand('all', this)">หน้าแรก (ทั้งหมด)</button>
                </div>
            
            <div class="product-grid" id="pos-grid">
                <div style="grid-column: 1/-1; text-align: center; padding: 50px; color: var(--text-muted);">
                    <i class="ph-bold ph-spinner-gap" style="animation: spin 1s linear infinite; font-size: 2rem;"></i><br>กำลังโหลดคลังสินค้า...
                </div>
            </div>
        </div>

        <div class="cart-section">
            <div class="cart-header">
                <div class="cart-title"><i class="ph-bold ph-shopping-cart"></i> ตะกร้าสินค้า <span style="background:var(--accent-blue); color:white; font-size:0.8rem; padding:2px 8px; border-radius:10px; margin-left:5px;" id="cart-count">0</span></div>
                <button class="btn-clear" onclick="clearCart()"><i class="ph-bold ph-trash"></i> ล้าง</button>
            </div>
            
            <div class="cart-items" id="cart-items-container">
                <div class="cart-empty">
                    <i class="ph-fill ph-basket"></i>
                    <span>ยังไม่มีสินค้าในตะกร้า<br>สแกนบาร์โค้ด หรือคลิกเลือกสินค้า</span>
                </div>
            </div>

            <div class="cart-footer">
                <div class="payment-toggle">
                    <button class="pt-btn active" id="btn-mode-cash" onclick="setPaymentMode('cash')">ซื้อสด (Cash)</button>
                    <button class="pt-btn" id="btn-mode-install" onclick="setPaymentMode('installment')">ผ่อน/ออม (Installment)</button>
                </div>
                
                <div style="padding-top: 10px;">
                    <div class="summary-row"><span>รวมจำนวน</span><span id="sum-qty">0 ชิ้น</span></div>
                    <div class="summary-row total"><span>ยอดสุทธิ</span><span class="total-val" id="sum-total">฿0</span></div>
                </div>
                
                <button class="btn-checkout" id="btn-checkout-main" onclick="openCheckoutModal()" disabled>
                    <i class="ph-bold ph-wallet"></i> รับชำระเงิน
                </button>
            </div>
        </div>

    </div>

    <div class="modal-overlay" id="modal-checkout-cash">
        <div class="modal-card">
            <button class="modal-close" onclick="closeModal('modal-checkout-cash')"><i class="ph-bold ph-x"></i></button>
            <div class="modal-title"><i class="ph-fill ph-money" style="color:var(--success);"></i> รับชำระเงินสด</div>
            
            <div style="display:flex; justify-content:space-between; margin-bottom:20px; font-size:1.1rem; border-bottom:1px solid var(--border-color); padding-bottom:10px;">
                <span style="color:var(--text-muted); font-weight:600;">ยอดที่ต้องชำระ:</span>
                <span style="font-weight:700; color:var(--text-main);" id="checkout-total-cash">฿0</span>
            </div>

            <div class="form-group">
                <label class="form-label">รับเงินมา (บาท)</label>
                <input type="number" class="form-input" id="input-received" placeholder="0" oninput="calculateChange()">
            </div>

            <div class="change-display">
                <div class="change-label">เงินทอน</div>
                <div class="change-val" id="change-display-val">฿0</div>
            </div>

            <div class="btn-print-group">
                <button class="btn-print" onclick="processPayment('cash', 58)"><i class="ph-bold ph-printer"></i> พิมพ์ 58mm</button>
                <button class="btn-print" onclick="processPayment('cash', 80)"><i class="ph-bold ph-printer"></i> พิมพ์ 80mm</button>
            </div>
            <button class="btn-checkout" style="margin-top: 10px;" onclick="processPayment('cash', 0)">
                <i class="ph-bold ph-check-circle"></i> บันทึกโดยไม่พิมพ์บิล
            </button>
        </div>
    </div>

    <div class="modal-overlay" id="modal-checkout-install">
        <div class="modal-card">
            <button class="modal-close" onclick="closeModal('modal-checkout-install')"><i class="ph-bold ph-x"></i></button>
            <div class="modal-title"><i class="ph-fill ph-hand-coins" style="color:var(--warning);"></i> เปิดบิลผ่อน/ออม</div>
            
            <div class="form-group">
                <label class="form-label">เบอร์โทรศัพท์ลูกค้า (สำหรับค้นหา/สร้างใหม่)</label>
                <input type="tel" class="form-input" id="input-cus-phone" placeholder="08X-XXX-XXXX">
            </div>
            <div class="form-group">
                <label class="form-label">ชื่อลูกค้า</label>
                <input type="text" class="form-input" id="input-cus-name" placeholder="ชื่อ-นามสกุล">
            </div>
            <div class="form-group">
                <label class="form-label">รับเงินดาวน์ / เปิดออม (บาท)</label>
                <input type="number" class="form-input" id="input-downpayment" placeholder="0" style="border-color:var(--warning);">
            </div>

            <div class="btn-print-group">
                <button class="btn-print" onclick="processPayment('install', 58)"><i class="ph-bold ph-printer"></i> พิมพ์ 58mm</button>
                <button class="btn-print" onclick="processPayment('install', 80)"><i class="ph-bold ph-printer"></i> พิมพ์ 80mm</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="sys-modal">
        <div class="modal-card" style="text-align: center; max-width: 350px;">
            <i id="sys-icon" class="ph-fill ph-info" style="font-size: 4rem; color: var(--accent-blue); margin-bottom: 10px;"></i>
            <h3 style="font-size: 1.3rem; font-weight: 700; margin-bottom: 10px;" id="sys-title">Title</h3>
            <p style="color: var(--text-muted); margin-bottom: 20px;" id="sys-msg">Message</p>
            <button class="btn-checkout" onclick="closeModal('sys-modal')">ตกลง</button>
        </div>
    </div>

    <div id="print-area">
        <div id="receipt-container" class="receipt-base">
            </div>
    </div>

    <style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
        const supabaseUrl = 'https://xjjcnlzynzsvopmcooky.supabase.co'
        const supabaseKey = 'sb_publishable_w7A_BOSi0r1r4t93exl1gg_j1jPRU_E'
        const supabase = createClient(supabaseUrl, supabaseKey)

        // UI Basic
        document.getElementById('cashier-name').innerText = localStorage.getItem('emp_name') || 'Admin';
        window.toggleTheme = () => {
            const body = document.body; const icon = document.getElementById('theme-icon');
            if (body.getAttribute('data-theme') === 'dark') { body.removeAttribute('data-theme'); icon.className = 'ph-bold ph-moon'; localStorage.setItem('theme', 'light'); } 
            else { body.setAttribute('data-theme', 'dark'); icon.className = 'ph-bold ph-sun'; localStorage.setItem('theme', 'dark'); }
        };
        if(localStorage.getItem('theme') === 'dark') toggleTheme();
        
        window.closeModal = (id) => document.getElementById(id).classList.remove('active');
        window.customAlert = (type, title, msg) => {
            document.getElementById('sys-title').innerText = title; document.getElementById('sys-msg').innerText = msg;
            document.getElementById('sys-icon').className = type === 'success' ? 'ph-fill ph-check-circle' : type === 'error' ? 'ph-fill ph-warning-circle' : 'ph-fill ph-info';
            document.getElementById('sys-icon').style.color = type === 'success' ? 'var(--success)' : type === 'error' ? 'var(--danger)' : 'var(--accent-blue)';
            document.getElementById('sys-modal').classList.add('active');
        };

        // Global State
        let allSKUs = [];
        let currentFilterBrand = 'all';
        let cart = [];
        let paymentMode = 'cash'; // 'cash' or 'installment'

        // 1. Fetch Data
        async function loadPOSData() {
            try {
                // ดึงแบรนด์
                const { data: brands } = await supabase.from('sys_brands').select('*').order('name');
                const brandFilter = document.getElementById('brand-filter-container');
                if(brands) {
                    brands.forEach(b => {
                        brandFilter.innerHTML += `<button class="filter-chip" onclick="filterBrand('${b.name}', this)">${b.name}</button>`;
                    });
                }

                // 🔥 แก้ตรงนี้: เปลี่ยนจากการดึงรูปและชื่อจาก products เป็นดึงแค่ (*) เผื่อไว้ ป้องกัน Error 400
                const { data: skus, error } = await supabase.from('product_skus').select(`*, products(brand, model)`).order('created_at', { ascending: false });
                if(error) throw error;

                // ประมวลผลและเก็บลง Array
                allSKUs = skus.map(s => {
                    let totalStock = 0;
                    if(s.branch_stocks) { Object.values(s.branch_stocks).forEach(q => totalStock += parseInt(q)||0); }
                    
                    return {
                        id: s.sku_id,
                        barcode: s.barcode,
                        brand: s.products?.brand || 'Unknown',
                        model: s.products?.model || 'Unknown',
                        color: s.color_name,
                        colorHex: s.color_hex,
                        cap: s.capacity,
                        price: s.sale_price > 0 ? s.sale_price : (s.price_cash || 0),
                        stock: totalStock,
                        img: s.image_url || 'https://via.placeholder.com/150?text=No+Image'
                    };
                });

                renderGrid(allSKUs);

            } catch (err) {
                console.error("Supabase Error:", err);
                document.getElementById('pos-grid').innerHTML = `<div style="grid-column:1/-1; text-align:center; color:var(--danger);">โหลดข้อมูลล้มเหลว กรุณารีเฟรช</div>`;
            }
        }

        // 2. Render Grid
        function renderGrid(items) {
            const grid = document.getElementById('pos-grid');
            grid.innerHTML = '';
            
            if(items.length === 0) {
                grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:40px; color:var(--text-muted);">ไม่พบสินค้าที่ค้นหา</div>`; return;
            }

            items.forEach(item => {
                const isOutOfStock = item.stock <= 0;
                grid.innerHTML += `
                    <div class="product-card ${isOutOfStock ? 'disabled' : ''}" onclick="${isOutOfStock ? '' : `addToCart('${item.id}')`}">
                        <div class="p-img-box">
                            <img src="${item.img}">
                            <div class="p-stock-badge ${isOutOfStock ? 'empty' : ''}">${isOutOfStock ? 'หมด' : `เหลือ ${item.stock}`}</div>
                        </div>
                        <div class="p-info">
                            <div class="p-brand">${item.brand}</div>
                            <div class="p-name">${item.model}</div>
                            <div class="p-variant">
                                <div class="color-dot" style="background-color: ${item.colorHex};"></div> ${item.color} | ${item.cap}
                            </div>
                            <div class="p-price">฿${item.price.toLocaleString()}</div>
                        </div>
                    </div>
                `;
            });
        }

        // 3. Filter & Search & Barcode Scanner
        window.filterBrand = (brand, btnElement) => {
            currentFilterBrand = brand;
            document.querySelectorAll('.filter-chip').forEach(el => el.classList.remove('active'));
            btnElement.classList.add('active');
            applySearch();
        };

        document.getElementById('pos-search').addEventListener('input', applySearch);

        function applySearch() {
            const keyword = document.getElementById('pos-search').value.toLowerCase().trim();
            
            // Smart Barcode Detection (ถ้าความยาวพิมพ์เป๊ะๆ เหมือนบาร์โค้ด และมีตัวนั้นตัวเดียว ให้หยิบลงตะกร้าเลย)
            if(keyword.length > 5 && keyword.includes('nt-')) {
                const exactMatch = allSKUs.find(s => s.barcode.toLowerCase() === keyword);
                if(exactMatch && exactMatch.stock > 0) {
                    addToCart(exactMatch.id);
                    document.getElementById('pos-search').value = ''; // เคลียร์ช่อง
                    return; // จบการทำงาน ไม่ต้องเรนเดอร์ใหม่
                }
            }

            const filtered = allSKUs.filter(item => {
                const matchBrand = currentFilterBrand === 'all' || item.brand === currentFilterBrand;
                const matchKey = item.model.toLowerCase().includes(keyword) || item.barcode.toLowerCase().includes(keyword) || item.brand.toLowerCase().includes(keyword);
                return matchBrand && matchKey;
            });
            renderGrid(filtered);
        }

        // Barcode Scanner Global Listener (จำลองการยิงปืนบาร์โค้ด)
        let barcodeBuffer = '';
        let barcodeTimer;
        document.addEventListener('keydown', (e) => {
            // ถ้ายิงปืนบาร์โค้ด มันจะพิมพ์เร็วมากและจบด้วย Enter
            if(e.target.tagName === 'INPUT') return; // ข้ามถ้ากำลังพิมพ์ในช่องอื่นอยู่
            
            if(e.key === 'Enter') {
                if(barcodeBuffer.length > 3) {
                    const exactMatch = allSKUs.find(s => s.barcode.toUpperCase() === barcodeBuffer.toUpperCase());
                    if(exactMatch) {
                        if(exactMatch.stock > 0) addToCart(exactMatch.id);
                        else customAlert('error', 'สินค้าหมด', 'สินค้ารหัสนี้สต็อกหมดแล้วครับ');
                    } else {
                        customAlert('error', 'ไม่พบรหัสสินค้า', `ไม่พบรหัส ${barcodeBuffer} ในระบบ`);
                    }
                }
                barcodeBuffer = '';
            } else {
                barcodeBuffer += e.key;
                clearTimeout(barcodeTimer);
                barcodeTimer = setTimeout(() => { barcodeBuffer = ''; }, 100); // เคลียร์ถ้าพิมพ์ช้า (แปลว่าคนพิมพ์ ไม่ใช่ปืน)
            }
        });

        // 4. Cart Logic
        window.addToCart = (skuId) => {
            const item = allSKUs.find(s => s.id === skuId);
            if(!item) return;

            const existing = cart.find(c => c.id === skuId);
            if(existing) {
                if(existing.qty < item.stock) existing.qty++;
                else customAlert('info', 'สต็อกไม่พอ', 'ไม่สามารถเพิ่มจำนวนได้อีก');
            } else {
                cart.push({ ...item, qty: 1 });
            }
            renderCart();
        };

        window.updateQty = (skuId, change) => {
            const index = cart.findIndex(c => c.id === skuId);
            if(index > -1) {
                const item = cart[index];
                const stockLimit = allSKUs.find(s => s.id === skuId).stock;
                
                item.qty += change;
                if(item.qty > stockLimit) { item.qty = stockLimit; customAlert('info', 'สต็อกจำกัด', `มีสินค้าเพียง ${stockLimit} ชิ้น`); }
                if(item.qty <= 0) cart.splice(index, 1);
            }
            renderCart();
        };

        window.clearCart = () => { cart = []; renderCart(); };

        function renderCart() {
            const container = document.getElementById('cart-items-container');
            let totalQty = 0; let totalPrice = 0;

            if(cart.length === 0) {
                container.innerHTML = `<div class="cart-empty"><i class="ph-fill ph-basket"></i><span>ยังไม่มีสินค้าในตะกร้า</span></div>`;
                document.getElementById('btn-checkout-main').disabled = true;
            } else {
                container.innerHTML = '';
                document.getElementById('btn-checkout-main').disabled = false;
                
                cart.forEach(item => {
                    totalQty += item.qty;
                    totalPrice += (item.qty * item.price);
                    
                    container.innerHTML += `
                        <div class="cart-item">
                            <img src="${item.img}" class="ci-img">
                            <div class="ci-details">
                                <div class="ci-name">${item.model}</div>
                                <div class="ci-var">${item.color} | ${item.cap}</div>
                                <div class="ci-price">฿${item.price.toLocaleString()}</div>
                            </div>
                            <div class="ci-qty-ctrl">
                                <button class="qty-btn" onclick="updateQty('${item.id}', -1)"><i class="ph-bold ph-minus"></i></button>
                                <input type="text" class="qty-val" value="${item.qty}" readonly>
                                <button class="qty-btn" onclick="updateQty('${item.id}', 1)"><i class="ph-bold ph-plus"></i></button>
                            </div>
                        </div>
                    `;
                });
            }

            document.getElementById('cart-count').innerText = totalQty;
            document.getElementById('sum-qty').innerText = `${totalQty} ชิ้น`;
            document.getElementById('sum-total').innerText = `฿${totalPrice.toLocaleString()}`;
        }

        // 5. Checkout & Payment Modes
        window.setPaymentMode = (mode) => {
            paymentMode = mode;
            document.getElementById('btn-mode-cash').classList.remove('active');
            document.getElementById('btn-mode-install').classList.remove('active');
            if(mode === 'cash') document.getElementById('btn-mode-cash').classList.add('active');
            else document.getElementById('btn-mode-install').classList.add('active');
        };

        let currentTotal = 0;
        window.openCheckoutModal = () => {
            currentTotal = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            
            if(paymentMode === 'cash') {
                document.getElementById('checkout-total-cash').innerText = `฿${currentTotal.toLocaleString()}`;
                document.getElementById('input-received').value = '';
                document.getElementById('change-display-val').innerText = '฿0';
                document.getElementById('modal-checkout-cash').classList.add('active');
                setTimeout(() => document.getElementById('input-received').focus(), 100);
            } else {
                document.getElementById('input-cus-phone').value = '';
                document.getElementById('input-cus-name').value = '';
                document.getElementById('input-downpayment').value = '';
                document.getElementById('modal-checkout-install').classList.add('active');
            }
        };

        window.calculateChange = () => {
            const rec = parseFloat(document.getElementById('input-received').value) || 0;
            const change = rec - currentTotal;
            const display = document.getElementById('change-display-val');
            
            if(change >= 0) { display.innerText = `฿${change.toLocaleString()}`; display.style.color = 'var(--success)'; } 
            else { display.innerText = `ขาด ฿${Math.abs(change).toLocaleString()}`; display.style.color = 'var(--danger)'; }
        };

        // 6. PROCESS PAYMENT & PRINT ENGINE
        window.processPayment = async (mode, printSize) => {
            // ขั้นที่ 1: ตรวจสอบความถูกต้อง
            let received = 0, change = 0, cusName = 'ลูกค้าทั่วไป (Walk-in)', cusPhone = '-';
            
            if(mode === 'cash') {
                received = parseFloat(document.getElementById('input-received').value) || 0;
                if(received < currentTotal) return customAlert('error', 'เงินไม่พอ', 'จำนวนเงินที่รับมาน้อยกว่ายอดชำระครับ');
                change = received - currentTotal;
            } else {
                const dp = parseFloat(document.getElementById('input-downpayment').value) || 0;
                cusPhone = document.getElementById('input-cus-phone').value.trim();
                cusName = document.getElementById('input-cus-name').value.trim() || 'ไม่ระบุชื่อ';
                if(!cusPhone || dp <= 0) return customAlert('error', 'ข้อมูลไม่ครบ', 'กรุณากรอกเบอร์โทรและยอดเงินดาวน์/เปิดบิลออมครับ');
                received = dp;
            }

            // ขั้นที่ 2: จำลองการบันทึกฐานข้อมูล (หักสต็อก)
            closeModal(`modal-checkout-${mode}`);
            
            // ขั้นที่ 3: พิมพ์ใบเสร็จ (ถ้าเลือกขนาดมา)
            if(printSize === 58 || printSize === 80) {
                generateReceiptHTML(mode, printSize, received, change, cusName, cusPhone);
                
                // ใช้ Timeout ให้ Browser render HTML เสร็จก่อนสั่ง Print
                setTimeout(() => {
                    window.print();
                    // พิมพ์เสร็จแล้ว เคลียร์ตะกร้า
                    clearCart();
                    customAlert('success', 'ทำรายการสำเร็จ', 'ตัดสต็อกและพิมพ์ใบเสร็จเรียบร้อยแล้ว');
                }, 500);
            } else {
                // ไม่พิมพ์บิล
                clearCart();
                customAlert('success', 'ทำรายการสำเร็จ', 'ตัดสต็อกเรียบร้อย (ไม่พิมพ์บิล)');
            }
        };

        // 7. HTML GENERATOR FOR THERMAL PRINTER
        function generateReceiptHTML(mode, size, received, change, cusName, cusPhone) {
            const container = document.getElementById('receipt-container');
            container.className = `receipt-base receipt-${size}`;
            
            const dateStr = new Date().toLocaleString('th-TH');
            const receiptNo = 'INV' + Date.now().toString().substring(5);
            const cashier = localStorage.getItem('emp_name') || 'Admin';

            let itemsHtml = '';
            cart.forEach(item => {
                itemsHtml += `
                    <tr>
                        <td>${item.model} (${item.cap})<br><small>${item.barcode}</small></td>
                        <td align="center">${item.qty}</td>
                        <td class="r-price">${(item.price * item.qty).toLocaleString()}</td>
                    </tr>
                `;
            });

            let paymentHtml = '';
            if(mode === 'cash') {
                paymentHtml = `
                    <tr><td>ยอดสุทธิ (Total)</td><td class="r-price receipt-total">${currentTotal.toLocaleString()}</td></tr>
                    <tr><td>รับเงินสด (Cash)</td><td class="r-price">${received.toLocaleString()}</td></tr>
                    <tr><td>เงินทอน (Change)</td><td class="r-price">${change.toLocaleString()}</td></tr>
                `;
            } else {
                paymentHtml = `
                    <tr><td>ยอดรวมสินค้า</td><td class="r-price">${currentTotal.toLocaleString()}</td></tr>
                    <tr><td>เงินดาวน์/เงินออม</td><td class="r-price receipt-total">${received.toLocaleString()}</td></tr>
                    <tr><td>คงเหลือผ่อนชำระ</td><td class="r-price">${(currentTotal - received).toLocaleString()}</td></tr>
                    <tr><td colspan="2"><small>ชื่อลูกค้า: ${cusName}</small></td></tr>
                    <tr><td colspan="2"><small>เบอร์โทร: ${cusPhone}</small></td></tr>
                `;
            }

            container.innerHTML = `
                <div class="receipt-header">
                    <h2>NT PHONE</h2>
                    <p>โทร. 08X-XXX-XXXX</p>
                    <p>ใบเสร็จรับเงิน ${mode==='install'?'(เปิดบิลผ่อน)':'(อย่างย่อ)'}</p>
                </div>
                <div class="receipt-divider"></div>
                <div style="font-size:0.8em; margin-bottom:5px;">
                    <div>เลขที่: ${receiptNo}</div>
                    <div>วันที่: ${dateStr}</div>
                    <div>พนักงาน: ${cashier}</div>
                </div>
                <div class="receipt-divider"></div>
                
                <table class="receipt-table">
                    <thead><tr><th>รายการ</th><th style="text-align:center; width:15%;">จน.</th><th class="r-price" style="width:25%;">ราคา</th></tr></thead>
                    <tbody>${itemsHtml}</tbody>
                </table>
                
                <div class="receipt-divider"></div>
                
                <table class="receipt-summary">
                    <tbody>${paymentHtml}</tbody>
                </table>
                
                <div class="receipt-divider"></div>
                <div class="receipt-footer">
                    ขอบคุณที่ใช้บริการ NT PHONE<br>
                    <svg id="barcode-receipt" style="width:100%; height:40px; margin-top:5px;"></svg>
                </div>
            `;

            // วาดบาร์โค้ดลงใบเสร็จด้วย
            try { JsBarcode("#barcode-receipt", receiptNo, { width: 1.5, height: 30, displayValue: false, margin: 0 }); } catch(e){}
        }

        initPOSData();
        // Rename fix
        function initPOSData() { loadPOSData(); }
    </script>
</body>
</html>
